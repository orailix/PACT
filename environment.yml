name: PACT
channels:
  - pytorch
  - nvidia
  - defaults
  - conda-forge
dependencies:
  # --- Core Conda packages (generic) ---
  - python=3.12.7
  - pip=24.2
  - ffmpeg=4.3
  - numpy      # (Conda-provided NumPy; removed "numpy==2.1.3" from pip)
  - requests=2.32.3
  - pyyaml=6.0.2
  - ca-certificates=2024.9.24
  - certifi=2024.8.30
  - openssl=3.0.15

  # --- PyTorch & CUDA via Conda (generic HPC-friendly) ---
  - pytorch-cuda=11.8
  - torchtriton=3.1.0
  - pytorch-mutex=1.0

  # --- Everything else goes through pip ---
